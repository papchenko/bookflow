<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      var pathSegmentsToKeep = 0;

      var l = window.location;
      var newUrl =
        l.protocol +
        '//' +
        l.hostname +
        (l.port ? ':' + l.port : '') +
        '/' +
        l.pathname.split('/').slice(pathSegmentsToKeep + 1).join('/') +
        l.search +
        l.hash;

      window.location.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          '/?redirect=' +
          encodeURIComponent(l.pathname + l.search + l.hash)
      );
    </script>
  </head>
  <body></body>
</html>
